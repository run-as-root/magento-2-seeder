name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compute_matrix:
    name: Compute Magento matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.supported-version.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: supported-version
        uses: graycoreio/github-actions-magento2/supported-version@v6.0.0
        with:
          include_services: true
          # 2.4.6 excluded: magento/framework pins symfony/console ^5.4,
          # which conflicts with laravel/prompts ^0.3 (needs ^6.2+).
          kind: custom
          custom_versions: "magento/project-community-edition:2.4.7-p9, magento/project-community-edition:2.4.8-p4"

  check-extension:
    name: MageCheck
    needs: compute_matrix
    uses: graycoreio/github-actions-magento2/.github/workflows/check-extension.yaml@v6.0.0
    with:
      matrix: ${{ needs.compute_matrix.outputs.matrix }}

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-phpstan-${{ hashFiles('composer.json') }}
          restore-keys: composer-phpstan-
      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: vendor/bin/phpstan analyse --no-progress

  coverage:
    name: Coverage (clover)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: pcov
          tools: composer:v2
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-coverage-${{ hashFiles('composer.json') }}
          restore-keys: composer-coverage-
      - run: composer install --prefer-dist --no-interaction --no-progress
      - name: PHPUnit with clover coverage
        run: vendor/bin/phpunit --testsuite=Unit --coverage-clover=coverage.xml
      - name: PR comment + job summary
        if: github.event_name == 'pull_request'
        uses: lucassabreu/comment-coverage-clover@v0.15.3
        with:
          file: coverage.xml
      - name: Upload clover artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-clover
          path: coverage.xml
          retention-days: 14
